services:
  db:
    image: postgres:16-alpine
    container_name: fivaliajobs-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fivalia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fivalia}
      POSTGRES_DB: ${POSTGRES_DB:-fivaliajobs}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
