services:
  db:
    image: postgres:16-alpine
    container_name: fivaliajobs-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fivalia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fivalia}
      POSTGRES_DB: ${POSTGRES_DB:-fivaliajobs}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fivalia -d fivaliajobs"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: fivaliajobs-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-fivalia}:${POSTGRES_PASSWORD:-fivalia}@db:5432/${POSTGRES_DB:-fivaliajobs}
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-long-random-secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: 3000
      NODE_ENV: ${NODE_ENV:-production}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8081}
    ports:
      - "3000:3000"
    volumes:
      - uploads_data:/app/uploads

volumes:
  postgres_data:
  uploads_data:
